include "application"

# Default test config: PostgreSQL via peer auth over the Unix socket.
# Authenticates as the current Unix user; no password.
db.default.driver   = "org.postgresql.Driver"
db.default.url      = "jdbc:postgresql://localhost/recletters_test?socketFactory=org.newsclub.net.unix.AFUNIXSocketFactory$FactoryArg&socketFactoryArg=/var/run/postgresql/.s.PGSQL.5432"
db.default.username = ${user.name}
db.default.password = ""

# Required for FakeRequest, which has no Host header by default.
play.filters.hosts.allowed = ["."]

# Evolutions: auto-apply ups and downs so the schema is recreated cleanly.
play.evolutions.enabled                   = true
play.evolutions.db.default.enabled        = true
play.evolutions.db.default.autoApply      = true
play.evolutions.db.default.autoApplyDowns = true

# Stable test secret.
play.http.secret.key = "test-secret-test-secret-test-secret-test-secret-test"

# http://localhost during tests; do not require Secure cookies.
play.http.session.secure = false

# Required operator config (placeholders).
site_name      = "Test"
site_url       = "http://localhost"
main_site_url  = "http://localhost"
email_from     = "test@example.com"
api_token      = "test-token"

play.mailer.host = "localhost"
play.mailer.port = 25
play.mailer.mock = true

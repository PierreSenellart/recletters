include "test"

# Overrides for MySQL/MariaDB tests. Drives the same suite via socket auth on
# /var/run/mysqld/mysqld.sock as the current Unix user. Requires a MySQL user
# of the same name authenticated via the `unix_socket` / `auth_socket` plugin,
# with privileges on `recletters_%` and `hotcrp_%`. See docs/develop.md.
db.default.driver   = "org.mariadb.jdbc.Driver"
db.default.url      = "jdbc:mariadb:///recletters_test?localSocket=/var/run/mysqld/mysqld.sock"
db.default.username = ${user.name}
db.default.password = ""

# Second DB that imitates a sibling HotCRP installation. Used by the
# HotCRPImporter spec, which creates Paper / PaperOption tables and asserts
# the importer round-trips the right ImportedDossier list.
db.hotcrp.driver   = "org.mariadb.jdbc.Driver"
db.hotcrp.url      = "jdbc:mariadb:///hotcrp_test?localSocket=/var/run/mysqld/mysqld.sock"
db.hotcrp.username = ${user.name}
db.hotcrp.password = ""

# Play Evolutions has nothing to do on the hotcrp DB; the spec manages its
# own schema.
play.evolutions.db.hotcrp.enabled = false

# Turn the HotCRP importer on for the test profile, with a tiny option-to-role
# mapping the fixture in HotCRPImporterSpec relies on.
importers.hotcrp.enabled = true
importers.hotcrp.option-mapping {
  "1" = "supervisor"
  "2" = "external"
}

include "test"

# Overrides for MySQL/MariaDB tests. Drives the same suite via socket auth on
# /var/run/mysqld/mysqld.sock as the current Unix user. Requires a MySQL user
# of the same name authenticated via the `unix_socket` / `auth_socket` plugin,
# with privileges on `recletters_%`. See docs/develop.md.
db.default.driver   = "org.mariadb.jdbc.Driver"
db.default.url      = "jdbc:mariadb:///recletters_test?localSocket=/var/run/mysqld/mysqld.sock"
db.default.username = ${user.name}
db.default.password = ""

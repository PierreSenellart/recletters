# Self-contained docker-compose for local evaluation.
#
# PostgreSQL:
#   docker compose --profile postgres up --build
# MySQL/MariaDB:
#   docker compose --profile mysql    up --build
#
# The mailhog service catches outbound mail at http://localhost:8025.
services:
  app-postgres:
    profiles: ["postgres"]
    build: .
    depends_on:
      - postgres
      - mailhog
    environment:
      RECLETTERS_DB_URL:      "jdbc:postgresql://postgres/recletters"
      RECLETTERS_DB_USER:     recletters
      RECLETTERS_DB_PASSWORD: recletters
      RECLETTERS_DB_DRIVER:   "org.postgresql.Driver"
      RECLETTERS_MAILER_HOST: mailhog
      RECLETTERS_MAILER_PORT: "1025"
    ports: ["9000:9000"]
    volumes:
      - ./docker/application.docker.conf:/etc/recletters/application.conf:ro

  app-mysql:
    profiles: ["mysql"]
    build: .
    depends_on:
      - mysql
      - mailhog
    environment:
      RECLETTERS_DB_URL:      "jdbc:mariadb://mysql/recletters"
      RECLETTERS_DB_USER:     recletters
      RECLETTERS_DB_PASSWORD: recletters
      RECLETTERS_DB_DRIVER:   "org.mariadb.jdbc.Driver"
      RECLETTERS_MAILER_HOST: mailhog
      RECLETTERS_MAILER_PORT: "1025"
      RECLETTERS_EVOLUTIONS_FLAVOUR: mysql
    ports: ["9000:9000"]
    volumes:
      - ./docker/application.docker.conf:/etc/recletters/application.conf:ro

  postgres:
    profiles: ["postgres"]
    image: postgres:16
    environment:
      POSTGRES_USER:     recletters
      POSTGRES_PASSWORD: recletters
      POSTGRES_DB:       recletters
    volumes: [pgdata:/var/lib/postgresql/data]

  mysql:
    profiles: ["mysql"]
    image: mariadb:11
    environment:
      MARIADB_USER:           recletters
      MARIADB_PASSWORD:       recletters
      MARIADB_DATABASE:       recletters
      MARIADB_ROOT_PASSWORD:  recletters-root
    volumes: [mysqldata:/var/lib/mysql]

  mailhog:
    profiles: ["postgres", "mysql"]
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP

volumes:
  pgdata: {}
  mysqldata: {}

# Container-side config. Reads DB and mailer connection details from the
# RECLETTERS_* environment variables set in docker-compose.yml.
include "secrets.conf"

play.filters.enabled += "play.filters.headers.SecurityHeadersFilter"
play.filters.headers {
  contentSecurityPolicy   = "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; frame-ancestors 'none'"
  frameOptions            = "DENY"
  contentTypeOptions      = "nosniff"
  referrerPolicy          = "same-origin"
}

# Container is behind reverse proxy in production; for evaluation we keep
# session.secure=false so http://localhost works.
play.http.session.secure   = false
play.http.session.httpOnly = true
play.http.session.sameSite = "lax"

play.http.parser.maxDiskBuffer   = 10485760
play.http.parser.maxMemoryBuffer = 102400

play.evolutions.enabled                  = true
play.evolutions.db.default.enabled       = true
play.evolutions.db.default.autoApply     = true
play.evolutions.db.default.autoApplyDowns = false

play.mailer.host = ${?RECLETTERS_MAILER_HOST}
play.mailer.port = ${?RECLETTERS_MAILER_PORT}

db.default.driver   = ${?RECLETTERS_DB_DRIVER}
db.default.url      = ${?RECLETTERS_DB_URL}
db.default.username = ${?RECLETTERS_DB_USER}
db.default.password = ${?RECLETTERS_DB_PASSWORD}

play.http.secret.key = "docker-only-change-me-or-set-via-RECLETTERS_SECRET-env"
play.http.secret.key = ${?RECLETTERS_SECRET}

site_name      = "Recletters demo"
site_url       = "http://localhost:9000"
main_site_url  = "http://example.org"
email_from     = "noreply@example.org"
api_token      = "docker-demo-token"
api_token      = ${?RECLETTERS_API_TOKEN}

reminder.timezone   = "UTC"
reminder.days       = 7

play.i18n.langs = ["en", "fr"]

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Run the full test suite (unit + HTTP-layer integration) against a real
  # PostgreSQL or MySQL/MariaDB instance bootstrapped on the runner. Each engine
  # is bootstrapped with passwordless socket auth for the runner user; that
  # matches the local-dev pattern (peer auth on PG, auth_socket on MySQL).
  test:
    name: Tests (${{ matrix.engine }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [pg, mysql]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
      - uses: sbt/setup-sbt@v1

      - name: Bootstrap PostgreSQL
        if: matrix.engine == 'pg'
        run: |
          sudo systemctl start postgresql || sudo service postgresql start
          sudo -u postgres createuser -s "$USER"

      - name: Bootstrap MySQL/MariaDB
        if: matrix.engine == 'mysql'
        env:
          MYSQL_PWD: root
        run: |
          sudo systemctl start mysql || sudo service mysql start
          # The preinstalled MySQL on ubuntu-latest authenticates root with the
          # password 'root', not via socket; the auth_socket plugin is not
          # loaded by default. Install it, then install an auth_socket user
          # for the runner's Unix user. Subsequent connections go over the
          # Unix socket passwordless.
          mysql -uroot -e "INSTALL PLUGIN auth_socket SONAME 'auth_socket.so';" || true
          mysql -uroot -e "CREATE USER IF NOT EXISTS '$USER'@'localhost' IDENTIFIED WITH auth_socket;"
          mysql -uroot -e "GRANT ALL PRIVILEGES ON \`recletters\\_%\`.* TO '$USER'@'localhost';"
          mysql -uroot -e "FLUSH PRIVILEGES;"

      - name: Run the full suite against ${{ matrix.engine }}
        run: make test-${{ matrix.engine }}

  package-deb:
    name: Build .deb
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: sbt debian:packageBin
        run: sbt -batch "debian:packageBin"
      - name: Upload .deb artefact
        uses: actions/upload-artifact@v5
        with:
          name: recletters-deb
          path: target/*.deb
